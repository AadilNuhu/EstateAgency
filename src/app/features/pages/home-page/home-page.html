<div>
    <app-navbar></app-navbar>
    <!-- Hero Section -->
    <section class="relative h-screen overflow-hidden">

        <div class="overflow-hidden w-full h-screen">
            <div class="flex w-full transition-transform duration-700 ease-in h-full"
                [style.transform]="'translateX(-' + (currentIndex * 100) + '%)'">
                @for(img of carouselImages; track img){
                <img [src]="img" alt="" class="min-w-full h-screen object-cover">
                }

            </div>

        </div>

        <div
            class="absolute w-screen h-screen bg-black/40 top-0 left-0 right-0 z-50 flex  items-center justify-center flex-col">
            <button (click)="next()" class="text-surface border-0  absolute left-4 cursor-pointer">
                <i class="bi bi-chevron-left text-surface text-2xl "></i>
            </button>
            <div>
                <p class="text-white mb-5">Doral, Florida</p>
                <h2 class="text-[32px] md:text-[56px] font-extrabold md:font-black text-surface uppercase mb-10"><span
                        class="text-accent">204</span>
                    Olive
                    Road Two</h2>
                <a routerLink="/"
                    class="border-2 text-2xl uppercase text-surface font-bold border-accent px-8 py-3 rounded-full">rent
                    | $
                    12.000</a>

            </div>
            <button (click)="prev()" class="text-surface border-0 absolute right-4 cursor-pointer">
                <i class="bi bi-chevron-right text-surface text-2xl "></i>
            </button>

        </div>
        <div class="flex  space-x-1 absolute bottom-10 left-1/2 -translate-x-1/2 z-50 transition-all duration-300">
            @for(img of carouselImages; track img){
            <div (click)="change($index)" class="h-1.5  cursor-pointer bg-gray-400"
                [class.bg-green-400]="currentIndex === $index" [class.bg-white]="currentIndex !== $index"
                [class.w-10]="currentIndex === $index" [class.w-6]="currentIndex !== $index">
            </div>
            }
        </div>



    </section>

</div>
